<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHAAR — Clinical Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
        colors: { cream: '#FAFAF7', emerald: { 950: '#022c22', 900: '#064e3b', 800: '#065f46', 600: '#059669', 50: '#ecfdf5' }, saffron: { 500: '#f97316', 400: '#fb923c' } }
      }}
    }
  </script>
  <style>
    body { background-color: #FAFAF7; color: #022c22; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); box-shadow: 0 8px 32px 0 rgba(2, 44, 34, 0.05); }
    .ai-input-glow:focus-within { box-shadow: 0 0 25px rgba(5, 150, 105, 0.15); border-color: #059669; }
    .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: 40px 40px; background-image: linear-gradient(to right, rgba(2, 44, 34, 0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(2, 44, 34, 0.04) 1px, transparent 1px); z-index: -1; pointer-events: none; }
    
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 2s linear infinite; }
  </style>
</head>

<body class="antialiased selection:bg-emerald-100 min-h-screen flex flex-col">
  <div class="bg-grid"></div>

  <nav class="sticky top-0 z-50 border-b border-stone-200/60 bg-cream/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-emerald-950 flex items-center justify-center"><i data-lucide="leaf" class="w-4.5 h-4.5 text-white"></i></div>
        <span class="text-lg font-bold text-emerald-950 tracking-tight">ahaar</span>
      </div>
      <button onclick="logout()" class="text-sm font-medium text-stone-500 hover:text-emerald-950 transition-colors flex items-center gap-1.5 bg-white/50 px-3 py-1.5 rounded-lg border border-stone-200/60">
        <i data-lucide="log-out" class="w-4 h-4"></i>
      </button>
    </div>
  </nav>

  <main class="flex-grow p-6 md:p-10">
    <div class="max-w-5xl mx-auto space-y-8">
      <header>
        <h1 class="font-serif text-3xl md:text-4xl font-bold text-emerald-950 mb-2">Today's Clinical Status</h1>
        <p class="text-stone-500 font-medium">Log your meals naturally to update your micronutrient vectors.</p>
      </header>

      <div class="bg-white rounded-[2rem] p-2 border border-stone-200/80 shadow-sm ai-input-glow transition-all duration-300">
        <div class="relative">
          <i data-lucide="bot" class="absolute left-6 top-6 w-6 h-6 text-emerald-600"></i>
          <textarea id="mealInput" rows="2" placeholder="e.g., '2 roti and 1 cup dal'" class="w-full bg-transparent resize-none text-emerald-950 text-xl pl-16 pr-6 py-6 focus:outline-none font-medium placeholder:text-stone-300"></textarea>
          <div class="flex justify-between items-center px-6 pb-4 pt-2 border-t border-stone-50">
            <div class="flex items-center gap-2 text-xs text-stone-400 font-bold uppercase tracking-wider"><i data-lucide="brain-circuit" class="w-4 h-4"></i> Agentic Extractor</div>
            <button id="analyzeBtn" onclick="analyzeMeal()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold px-6 py-3 rounded-xl flex items-center gap-2 shadow-lg transition-all active:scale-95">
              <i id="btnIcon" data-lucide="sparkles" class="w-4 h-4"></i>
              <i id="btnSpinner" data-lucide="loader-2" class="w-4 h-4 text-emerald-100 animate-spin hidden"></i>
              <span id="btnText">Analyze Meal</span>
            </button>
          </div>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-8 items-stretch">
        <div class="glass-card rounded-[2rem] p-8 flex flex-col">
          <h3 class="font-bold text-lg text-emerald-950 mb-6 flex items-center gap-2 border-b border-stone-100 pb-4">
            <i data-lucide="activity" class="w-5 h-5 text-saffron-500"></i> RDA Delivery
          </h3>
          
          <div class="relative w-[280px] h-[280px] md:w-[320px] md:h-[320px] mx-auto flex justify-center items-center">
            <canvas id="nutrientChart"></canvas>
          </div>

          <div class="mt-6 border-t border-stone-100 pt-4">
            <button id="toggleDetailsBtn" onclick="toggleDetails()" class="w-full flex items-center justify-between text-sm font-bold text-emerald-800 hover:text-emerald-600 transition-colors py-2">
              <span class="flex items-center gap-2"><i data-lucide="list" class="w-4 h-4"></i> View Clinical Breakdown</span>
              <i id="toggleDetailsIcon" data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-300"></i>
            </button>
            <div id="detailedBreakdown" class="hidden mt-4 space-y-4 overflow-hidden transition-all duration-300">
              </div>
          </div>
        </div>

        <div class="bg-emerald-950 rounded-[2rem] p-8 shadow-xl relative overflow-hidden flex flex-col">
          <div class="relative z-10 space-y-8">
            <div>
              <h4 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-3">Clinical Insight (Symptoms)</h4>
              <p id="insightText" class="text-emerald-50 text-lg leading-relaxed font-medium">Awaiting meal log...</p>
            </div>

            <div class="w-full h-px bg-emerald-800/60"></div>

            <div>
              <h4 class="text-xs font-bold text-saffron-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                <i data-lucide="lightbulb" class="w-4 h-4"></i> Actionable Tweak
              </h4>
              <div id="recommendationCard" onclick="toggleRecommendation()" class="bg-emerald-900/40 border border-emerald-800/50 rounded-2xl p-5 cursor-pointer hover:bg-emerald-900/60 transition-all group">
                <div class="flex justify-between items-start gap-4">
                  <p id="recommendationShort" class="text-emerald-100 text-sm leading-relaxed font-medium">Dietary interventions will appear here...</p>
                  <i id="expandIcon" data-lucide="chevron-down" class="w-5 h-5 text-emerald-500 transition-transform"></i>
                </div>
                <div id="recommendationDetails" class="hidden mt-4 pt-4 border-t border-emerald-800/50 space-y-4">
                  <div id="deficiencyList" class="space-y-3"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <section id="mealPlanSection" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif text-2xl md:text-3xl font-bold text-emerald-950">Tomorrow's Recovery Plan</h2>
          <button id="retryBtn" onclick="retryMealPlan()" class="flex items-center gap-2 px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-full text-xs font-bold text-emerald-700 hover:bg-emerald-100 transition-all">
            <i id="retryIcon" data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Shuffle Plan
          </button>
        </div>
        <div id="mealCards" class="grid md:grid-cols-3 gap-6"></div>
      </section>
    </div>
  </main>

  <script>
    lucide.createIcons();
    let currentGaps = [];

    let chart = new Chart(document.getElementById("nutrientChart"), {
      type: "radar",
      data: {
        labels: ["Protein", "Iron", "Zinc", "Magnesium", "Folate", "Vit D", "Calories"],
        datasets: [{
          data: [0, 0, 0, 0, 0, 0, 0],
          backgroundColor: 'rgba(5, 150, 105, 0.25)',
          borderColor: '#059669',
          borderWidth: 2,
          pointBackgroundColor: '#ea580c',
          pointBorderColor: '#fff',
          pointRadius: 4
        }]
      },
      options: { 
        responsive: true,
        maintainAspectRatio: true, 
        scales: { r: { min: 0, max: 100, ticks: { display: false }, pointLabels: { font: { family: 'Inter', size: 12, weight: '600' }, color: '#022c22' } } },
        plugins: { legend: { display: false } }
      }
    });

    function toggleRecommendation() {
      const details = document.getElementById("recommendationDetails");
      const icon = document.getElementById("expandIcon");
      const isHidden = details.classList.toggle("hidden");
      icon.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
    }

    function toggleDetails() {
      const breakdownDiv = document.getElementById("detailedBreakdown");
      const icon = document.getElementById("toggleDetailsIcon");
      const isHidden = breakdownDiv.classList.toggle("hidden");
      icon.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
    }

    // 🏆 BEAUTIFUL RENDERER: Direct Data Mapping with Staggered Animations
    function renderDetailedBreakdown(raw = {}, rda = {}, percentages = {}) {
      const container = document.getElementById("detailedBreakdown");
      container.innerHTML = ""; 

      const metrics = [
        { key: "calories", label: "Energy", unit: "kcal", icon: "zap", color: "from-saffron-400 to-saffron-600" },
        { key: "protein", label: "Protein", unit: "g", icon: "beef", color: "from-emerald-400 to-emerald-600" },
        { key: "iron", label: "Iron", unit: "mg", icon: "anvil", color: "from-rose-400 to-rose-600" },
        { key: "zinc", label: "Zinc", unit: "mg", icon: "microscope", color: "from-blue-400 to-blue-600" },
        { key: "magnesium", label: "Magnesium", unit: "mg", icon: "mountain", color: "from-indigo-400 to-indigo-600" },
        { key: "folate", label: "Folate (B9)", unit: "µg", icon: "dna", color: "from-teal-400 to-teal-600" },
        { key: "vitaminD", label: "Vitamin D", unit: "µg", icon: "sun", color: "from-amber-300 to-amber-500" }
      ];

      const fmt = (val) => {
        const num = Number(val) || 0;
        return num % 1 === 0 ? num : num.toFixed(1);
      };

      metrics.forEach((metric, i) => {
        const rawValue = raw[metric.key] ?? 0;
        const targetValue = rda[metric.key] ?? 0; 
        const percentValue = Math.round(percentages[metric.key] ?? 0);
        const visualPercentage = percentValue > 100 ? 100 : percentValue;

        const html = `
          <div class="opacity-0 translate-y-2 transition-all duration-500 ease-out" id="row-${i}">
            <div class="flex justify-between items-end mb-2">
              <div class="flex items-center gap-2">
                <div class="p-1.5 rounded-lg bg-white border border-stone-100 shadow-sm"><i data-lucide="${metric.icon}" class="w-3.5 h-3.5 text-emerald-900"></i></div>
                <div>
                  <p class="text-[11px] font-bold text-emerald-950 uppercase tracking-tight">${metric.label}</p>
                  <p class="text-[10px] font-medium text-stone-400">${fmt(rawValue)}${metric.unit} consumed</p>
                </div>
              </div>
              <div class="text-right">
                <p class="text-xs font-bold text-emerald-950">${percentValue}% <span class="text-[10px] text-stone-300 font-normal">/ target ${fmt(targetValue)}${metric.unit}</span></p>
              </div>
            </div>
            <div class="relative w-full bg-stone-100 rounded-full h-2.5 overflow-hidden shadow-inner">
              <div class="absolute top-0 left-0 h-full rounded-full bg-gradient-to-r ${metric.color} transition-all duration-[1500ms] cubic-bezier(0.34, 1.56, 0.64, 1)" 
                   style="width: 0%" id="bar-${i}"></div>
            </div>
          </div>
        `;
        
        container.insertAdjacentHTML('beforeend', html);
        setTimeout(() => {
          document.getElementById(`row-${i}`).classList.remove('opacity-0', 'translate-y-2');
          setTimeout(() => {
            const bar = document.getElementById(`bar-${i}`);
            if(bar) bar.style.width = `${visualPercentage}%`;
          }, 200);
        }, i * 100);
      });
      lucide.createIcons();
    }

    async function analyzeMeal() {
      const meal = document.getElementById("mealInput").value;
      if (!meal.trim()) return;

      const btn = document.getElementById("analyzeBtn");
      document.getElementById("btnText").innerText = "Analyzing...";
      document.getElementById("btnIcon").classList.add("hidden");
      document.getElementById("btnSpinner").classList.remove("hidden");

      try {
        const token = localStorage.getItem("token");
        // 🛡️ DYNAMIC PROFILE: Pull exactly what you set in onboarding.html
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");

        const res = await fetch("/api/nutrition/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ meal, profile: userData })
        });

        const data = await res.json();
        console.log("📥 Raw Data:", data);

        // Update Chart
        const achievedData = data.percentages || data.achieved || {};
        chart.data.datasets[0].data = [
          achievedData.protein, achievedData.iron, achievedData.zinc,
          achievedData.magnesium, achievedData.folate, achievedData.vitaminD, achievedData.calories
        ];
        chart.update();

        // 📈 Render the detailed clinical bars using direct mapping
        renderDetailedBreakdown(data.raw, data.rda, achievedData);

        // Update Text Logic
        document.getElementById("insightText").innerText = data.insight;
        document.getElementById("recommendationShort").innerText = data.recommendation?.short || "Analysis complete.";
        
        const list = document.getElementById("deficiencyList");
        if (data.recommendation?.details) {
            list.innerHTML = data.recommendation.details.map(item => `
              <div class="p-3 bg-emerald-950/50 rounded-xl border border-emerald-800/30">
                <span class="text-[10px] font-bold text-saffron-400 uppercase tracking-tighter">${item.nutrient} Boost</span>
                <p class="text-sm font-bold text-emerald-50">${item.suggestion}</p>
                <p class="text-[11px] text-emerald-400 italic mt-1">${item.reason}</p>
              </div>
            `).join('');
        }

        document.getElementById("mealPlanSection").classList.remove("hidden");
        if (data.mealPlan) renderMealPlan(data.mealPlan);

      } catch (e) {
        console.error(e);
        alert("Failed to analyze meal.");
      } finally {
        document.getElementById("btnText").innerText = "Analyze Meal";
        document.getElementById("btnIcon").classList.remove("hidden");
        document.getElementById("btnSpinner").classList.add("hidden");
        lucide.createIcons();
      }
    }

    function renderMealPlan(meals) {
      const container = document.getElementById("mealCards");
      container.innerHTML = meals.map(m => `
        <div class="bg-white border border-stone-200 rounded-[2rem] p-6 shadow-sm">
          <span class="px-2.5 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold uppercase rounded-lg">${m.type}</span>
          <h5 class="font-bold text-emerald-950 text-lg my-2">${m.dish}</h5>
          <p class="text-stone-500 text-xs leading-relaxed font-medium">${m.benefit}</p>
        </div>
      `).join('');
    }

   async function retryMealPlan() {
      const icon = document.getElementById("retryIcon");
      icon.classList.add("animate-spin-slow");

      try {
        const meal = document.getElementById("mealInput").value || "";
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");

        const res = await fetch("/api/nutrition/regen-plan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lowNutrients: currentGaps, profile: userData, meal: meal })
        });
        
        const data = await res.json();
        
        // 1. Update the Meal Cards
        if (data.mealPlan) {
            renderMealPlan(data.mealPlan);
        }

        // 2. 🔥 Update the Actionable Tweaks & Symptoms UI
        if (data.recommendation) {
            // Update the main texts
            document.getElementById("insightText").innerText = data.recommendation.symptoms || "Analysis complete.";
            document.getElementById("recommendationShort").innerText = data.recommendation.short || "Analysis complete.";
            
            // Re-render the detailed list of tweaks
            const list = document.getElementById("deficiencyList");
            if (data.recommendation.details) {
                list.innerHTML = data.recommendation.details.map(item => `
                  <div class="p-3 bg-emerald-950/50 rounded-xl border border-emerald-800/30">
                    <div class="flex items-center gap-2 mb-1">
                      <span class="text-[10px] font-bold text-saffron-400 uppercase tracking-tighter">${item.nutrient} Boost</span>
                    </div>
                    <p class="text-sm font-bold text-emerald-50">${item.suggestion}</p>
                    <p class="text-[11px] text-emerald-400 italic mt-1">${item.reason}</p>
                  </div>
                `).join('');
            }
        }
      } catch (e) { 
          console.error("Failed to shuffle:", e); 
      } finally {
          setTimeout(() => icon.classList.remove("animate-spin-slow"), 800);
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/index.html";
    }
  </script>
</body>
</html>
